version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
      - ../PDX Shows:/pdx_shows
      - C:\website\showcat:/website_showcat
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/opener_dev
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=src
      - SQLITE_DB_PATH=/pdx_shows/data/pdx.sqlite
      - WEB_OUTPUT_DIR=/website_showcat
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=opener_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
